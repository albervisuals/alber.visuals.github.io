<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio - ALBER.VISUALS</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
  @import "tailwindcss";

* {
  scroll-behavior: smooth;
}

body {
  background-color: #0a0a0a;
  overflow-x: hidden;
}

/* Custom scrollbar */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: #0a0a0a;
}
::-webkit-scrollbar-thumb {
  background: #f59e0b;
  border-radius: 999px;
}
::-webkit-scrollbar-thumb:hover {
  background: #fbbf24;
}

/* Image hover brightness */
.gallery-img {
  transition: filter 0.4s ease;
}
.gallery-img:hover {
  filter: brightness(1.05);
}


  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,typescript">
    const { useState, useEffect, useRef } = React;

    
const GALLERY_IMAGES = [
  {
    url: "https://images.pexels.com/photos/36862523/pexels-photo-36862523.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",
    alt: "Duelo en el área — Primera Federación",
    tag: "Acción",
  },
  {
    url: "https://images.pexels.com/photos/5470351/pexels-photo-5470351.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",
    alt: "Presión alta — Fútbol de élite",
    tag: "Partido",
  },
  {
    url: "https://images.pexels.com/photos/12616082/pexels-photo-12616082.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",
    alt: "Remate bajo focos — Noche de fútbol",
    tag: "Estadio",
  },
  {
    url: "https://images.pexels.com/photos/12313948/pexels-photo-12313948.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",
    alt: "Disputa por el balón — Intensidad",
    tag: "Acción",
  },
  {
    url: "https://images.pexels.com/photos/15949231/pexels-photo-15949231.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",
    alt: "La afición — Pasión en las gradas",
    tag: "Ambiente",
  },
  {
    url: "https://images.pexels.com/photos/13241581/pexels-photo-13241581.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",
    alt: "Control y visión — Dominio del balón",
    tag: "Técnica",
  },
];

const SPECS = [
  { label: "Cámara", value: "Sony Alpha a7R" },
  { label: "Objetivo", value: "Sony FE 70-200mm F4" },
  { label: "Especialidad", value: "Fotografía Deportiva" },
  { label: "Ubicación", value: "Móstoles, Madrid" },
  { label: "Experiencia", value: "Primera Federación" },
  { label: "Cobertura", value: "3 partidos oficiales" },
];

const NAV_LINKS = ["Inicio", "Portfolio", "Sobre mí", "Equipo", "Contacto"];

function App() {
  const [activeNav, setActiveNav] = useState("Inicio");
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [lightbox, setLightbox] = useState<null | (typeof GALLERY_IMAGES)[0]>(null);
  const [visibleSections, setVisibleSections] = useState<Set<string>>(new Set());
  const heroRef = useRef<HTMLDivElement>(null);

  useEffect(() => {
    const handleScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", handleScroll);
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            setVisibleSections((prev) => new Set([...prev, entry.target.id]));
          }
        });
      },
      { threshold: 0.15 }
    );
    document.querySelectorAll("[data-animate]").forEach((el) => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  const isVisible = (id: string) => visibleSections.has(id);

  return (
    <div className="bg-[#0a0a0a] text-white min-h-screen font-['Inter',sans-serif] overflow-x-hidden">
      {/* ── NAV ── */}
      <nav
        className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${
          scrolled
            ? "bg-[#0a0a0a]/95 backdrop-blur-md border-b border-white/10 py-3"
            : "bg-transparent py-6"
        }`}
      >
        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
          {/* Logo */}
          <a
            href="#"
            className="flex items-center gap-2 group"
            onClick={() => setActiveNav("Inicio")}
          >
            <span className="text-xl font-black tracking-tight text-white group-hover:text-amber-400 transition-colors duration-300">
              ALBER<span className="text-amber-400">.</span>VISUALS
            </span>
          </a>

          {/* Desktop links */}
          <ul className="hidden md:flex items-center gap-8">
            {NAV_LINKS.map((link) => (
              <li key={link}>
                <button
                  onClick={() => setActiveNav(link)}
                  className={`text-sm font-medium tracking-wide transition-all duration-300 relative group ${
                    activeNav === link ? "text-amber-400" : "text-white/70 hover:text-white"
                  }`}
                >
                  {link}
                  <span
                    className={`absolute -bottom-1 left-0 h-px bg-amber-400 transition-all duration-300 ${
                      activeNav === link ? "w-full" : "w-0 group-hover:w-full"
                    }`}
                  />
                </button>
              </li>
            ))}
          </ul>

          {/* CTA */}
          <a
            href="mailto:albervisuals@gmail.com"
            className="hidden md:inline-flex items-center gap-2 bg-amber-400 text-black text-sm font-bold px-5 py-2.5 rounded-full hover:bg-amber-300 transition-colors duration-300"
          >
            Contactar
          </a>

          {/* Hamburger */}
          <button
            className="md:hidden flex flex-col gap-1.5 p-2"
            onClick={() => setMenuOpen(!menuOpen)}
            aria-label="Menu"
          >
            <span className={`block h-0.5 w-6 bg-white transition-all duration-300 ${menuOpen ? "rotate-45 translate-y-2" : ""}`} />
            <span className={`block h-0.5 w-6 bg-white transition-all duration-300 ${menuOpen ? "opacity-0" : ""}`} />
            <span className={`block h-0.5 w-6 bg-white transition-all duration-300 ${menuOpen ? "-rotate-45 -translate-y-2" : ""}`} />
          </button>
        </div>

        {/* Mobile menu */}
        <div
          className={`md:hidden overflow-hidden transition-all duration-400 ${
            menuOpen ? "max-h-80 opacity-100" : "max-h-0 opacity-0"
          }`}
        >
          <ul className="flex flex-col px-6 pb-6 pt-2 gap-4 bg-[#0a0a0a]/95 backdrop-blur-md border-t border-white/10">
            {NAV_LINKS.map((link) => (
              <li key={link}>
                <button
                  onClick={() => { setActiveNav(link); setMenuOpen(false); }}
                  className={`text-sm font-medium ${activeNav === link ? "text-amber-400" : "text-white/70"}`}
                >
                  {link}
                </button>
              </li>
            ))}
            <li>
              <a href="mailto:albervisuals@gmail.com" className="inline-flex items-center gap-2 bg-amber-400 text-black text-sm font-bold px-5 py-2.5 rounded-full">
                Contactar
              </a>
            </li>
          </ul>
        </div>
      </nav>

      {/* ── HERO ── */}
      <section
        ref={heroRef}
        className="relative min-h-screen flex flex-col items-center justify-center overflow-hidden"
      >
        {/* Background */}
        <div className="absolute inset-0">
          <img
            src="https://images.pexels.com/photos/5470351/pexels-photo-5470351.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1080&w=1920"
            alt="hero"
            className="w-full h-full object-cover object-center scale-105"
            style={{ filter: "brightness(0.3)" }}
          />
          <div className="absolute inset-0 bg-gradient-to-b from-[#0a0a0a]/60 via-transparent to-[#0a0a0a]" />
          <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0a]/50 via-transparent to-[#0a0a0a]/50" />
        </div>

        {/* Grain texture */}
        <div
          className="absolute inset-0 opacity-30 pointer-events-none"
          style={{
            backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E")`,
            backgroundRepeat: "repeat",
            backgroundSize: "128px",
            mixBlendMode: "overlay",
          }}
        />

        {/* Content */}
        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
          <div className="inline-flex items-center gap-2 bg-amber-400/10 border border-amber-400/30 text-amber-400 text-xs font-semibold tracking-widest uppercase px-4 py-2 rounded-full mb-8 backdrop-blur-sm">
            <span className="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse" />
            Fotografía Deportiva · Móstoles, Madrid
          </div>

          <h1 className="text-6xl md:text-8xl lg:text-9xl font-black tracking-tight leading-none mb-6">
            <span className="block text-white">ALBER</span>
            <span
              className="block italic"
              style={{
                fontFamily: "'Playfair Display', serif",
                background: "linear-gradient(135deg, #f59e0b, #fbbf24, #fcd34d)",
                WebkitBackgroundClip: "text",
                WebkitTextFillColor: "transparent",
              }}
            >
              Visuals
            </span>
          </h1>

          <p className="text-white/60 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed font-light">
            Congelando el instante preciso donde la técnica del atleta y la emoción del juego convergen sobre el terreno de juego.
          </p>

          <div className="flex flex-col sm:flex-row gap-4 justify-center">
            <a
              href="#portfolio"
              className="bg-amber-400 text-black font-bold px-8 py-4 rounded-full hover:bg-amber-300 transition-all duration-300 hover:shadow-[0_0_30px_rgba(251,191,36,0.4)] text-sm tracking-wide"
            >
              Ver Portfolio
            </a>
            <a
              href="#sobre-mi"
              className="border border-white/30 text-white font-medium px-8 py-4 rounded-full hover:border-white/60 hover:bg-white/5 transition-all duration-300 text-sm tracking-wide backdrop-blur-sm"
            >
              Sobre mí
            </a>
          </div>
        </div>

        {/* Scroll indicator */}
        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-white/40 animate-bounce">
          <span className="text-xs tracking-widest uppercase">Scroll</span>
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
          </svg>
        </div>

        {/* Stats bar */}
        <div className="absolute bottom-0 left-0 right-0 z-10">
          <div className="max-w-4xl mx-auto px-6 pb-0">
            <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-t-2xl px-8 py-5 grid grid-cols-3 gap-4 divide-x divide-white/10">
              {[
                { num: "3", label: "Partidos Primera Federación" },
                { num: "5+", label: "Meses de experiencia" },
                { num: "∞", label: "Pasión por el fútbol" },
              ].map(({ num, label }) => (
                <div key={label} className="text-center px-4">
                  <div className="text-2xl md:text-3xl font-black text-amber-400">{num}</div>
                  <div className="text-white/50 text-xs mt-1 leading-tight">{label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* ── PORTFOLIO ── */}
      <section id="portfolio" className="py-24 px-6">
        <div className="max-w-7xl mx-auto">
          <div
            id="portfolio-header"
            data-animate
            className={`mb-16 transition-all duration-700 ${isVisible("portfolio-header") ? "opacity-100 translate-y-0" : "opacity-0 translate-y-10"}`}
          >
            <p className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-3">Portfolio</p>
            <h2 className="text-4xl md:text-6xl font-black tracking-tight text-white">
              Momentos <span className="text-white/30">que</span>
              <br />
              <span className="italic" style={{ fontFamily: "'Playfair Display', serif" }}>
                definen el juego
              </span>
            </h2>
          </div>

          {/* Masonry grid */}
          <div className="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4">
            {GALLERY_IMAGES.map((img, i) => (
              <div
                key={i}
                id={`gallery-${i}`}
                data-animate
                className={`break-inside-avoid group relative overflow-hidden rounded-xl cursor-pointer transition-all duration-700 ${
                  isVisible(`gallery-${i}`) ? "opacity-100 translate-y-0" : "opacity-0 translate-y-12"
                }`}
                style={{ transitionDelay: `${i * 80}ms` }}
                onClick={() => setLightbox(img)}
              >
                <img
                  src={img.url}
                  alt={img.alt}
                  className="w-full object-cover transition-transform duration-700 group-hover:scale-105"
                  loading="lazy"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-5">
                  <span className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-1">{img.tag}</span>
                  <p className="text-white text-sm font-medium">{img.alt}</p>
                </div>
                <div className="absolute top-4 right-4 bg-black/50 backdrop-blur-sm rounded-full p-2 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-2 group-hover:translate-y-0">
                  <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                  </svg>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── ABOUT ── */}
      <section id="sobre-mi" className="py-24 px-6 bg-[#0f0f0f]">
        <div className="max-w-7xl mx-auto">
          <div className="grid lg:grid-cols-2 gap-16 items-start">
            {/* Left column — image */}
            <div
              id="about-img"
              data-animate
              className={`relative transition-all duration-700 ${isVisible("about-img") ? "opacity-100 translate-x-0" : "opacity-0 -translate-x-12"}`}
            >
              <div className="relative rounded-2xl overflow-hidden aspect-[3/4]">
                <img
                  src="https://images.pexels.com/photos/35571136/pexels-photo-35571136.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=800"
                  alt="Fotógrafo deportivo en acción"
                  className="w-full h-full object-cover"
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent" />
              </div>
              {/* Floating badge */}
              <div className="absolute -bottom-6 -right-6 bg-amber-400 text-black rounded-2xl p-5 shadow-2xl shadow-amber-400/30">
                <div className="text-3xl font-black">16</div>
                <div className="text-xs font-bold tracking-wide">años</div>
              </div>
              {/* Sony badge */}
              <div className="absolute top-6 left-6 bg-black/70 backdrop-blur-md border border-white/20 text-white rounded-xl px-4 py-3 text-xs font-semibold">
                📷 Sony Alpha a7R
              </div>
            </div>

            {/* Right column — text */}
            <div
              id="about-text"
              data-animate
              className={`transition-all duration-700 delay-200 ${isVisible("about-text") ? "opacity-100 translate-x-0" : "opacity-0 translate-x-12"}`}
            >
              <p className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-4">Sobre mí</p>
              <h2 className="text-4xl md:text-5xl font-black tracking-tight text-white mb-8 leading-tight">
                Perfil<br />
                <span className="italic text-white/40" style={{ fontFamily: "'Playfair Display', serif" }}>
                  Profesional
                </span>
              </h2>

              <div className="space-y-5 text-white/70 leading-relaxed text-[15px]">
                <p>
                  Soy un <span className="text-white font-semibold">fotógrafo deportivo de 16 años</span>, residente en Móstoles, especializado en fotografía de fútbol y contenido visual relacionado con el deporte. Entiendo la fotografía no solo como un registro documental, sino como una <span className="text-amber-400 font-medium">herramienta narrativa fundamental</span> en el periodismo moderno, capaz de transmitir la adrenalina, la complejidad táctica y la pasión que definen cada encuentro.
                </p>
                <p>
                  Aunque llevo aproximadamente <span className="text-white font-semibold">cinco meses</span> dedicándome a la fotografía, ya he conseguido asistir en <span className="text-amber-400 font-semibold">tres ocasiones a partidos de Primera Federación</span>, desarrollando experiencia en cobertura deportiva y fotografía de acción en entornos reales de competición.
                </p>
                <p>
                  Trabajar bajo la exigencia y la presión del directo me ha enseñado a optimizar mi posicionamiento, a leer el desarrollo de las jugadas con anticipación y a garantizar la captura de momentos decisivos que aportan verdadero valor informativo y estético.
                </p>
                <p>
                  Me interesa seguir creciendo dentro del ámbito de la fotografía deportiva y el periodismo visual. Considero que el trabajo de un creador visual debe ir más allá del terreno de juego: debe documentar la <span className="text-white font-medium">tensión de los banquillos</span>, la euforia de las gradas y el esfuerzo invisible que rodea a cada partido.
                </p>
              </div>

              {/* Objective box */}
              <div className="mt-8 border border-amber-400/30 bg-amber-400/5 rounded-2xl p-6">
                <div className="flex items-center gap-2 mb-3">
                  <span className="w-2 h-2 bg-amber-400 rounded-full" />
                  <span className="text-amber-400 text-xs font-bold tracking-widest uppercase">Objetivo Profesional</span>
                </div>
                <p className="text-white/70 text-sm leading-relaxed">
                  Continuar desarrollándome como fotógrafo deportivo, ampliar experiencia en competiciones de mayor nivel y construir una <span className="text-white font-semibold">identidad visual propia</span> dentro del mundo del fútbol. Busco consolidar una firma gráfica sólida que aporte alto valor añadido a clubes, agencias deportivas y medios de comunicación.
                </p>
              </div>

              <a
                href="mailto:albervisuals@gmail.com"
                className="inline-flex items-center gap-3 mt-8 bg-amber-400 text-black font-bold px-7 py-4 rounded-full hover:bg-amber-300 transition-all duration-300 hover:shadow-[0_0_30px_rgba(251,191,36,0.4)] text-sm"
              >
                Trabajemos juntos
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" />
                </svg>
              </a>
            </div>
          </div>
        </div>
      </section>

      {/* ── EQUIPMENT ── */}
      <section id="equipo" className="py-24 px-6">
        <div className="max-w-7xl mx-auto">
          <div
            id="equipment-header"
            data-animate
            className={`text-center mb-16 transition-all duration-700 ${isVisible("equipment-header") ? "opacity-100 translate-y-0" : "opacity-0 translate-y-10"}`}
          >
            <p className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-3">Equipo</p>
            <h2 className="text-4xl md:text-6xl font-black tracking-tight text-white">
              Rigor <span className="italic text-white/30" style={{ fontFamily: "'Playfair Display', serif" }}>técnico</span>
            </h2>
            <p className="text-white/50 mt-4 max-w-xl mx-auto text-sm leading-relaxed">
              El equipo es el puente entre la visión del fotógrafo y la imagen final. Cada elección técnica responde a las exigencias del fotoperiodismo deportivo.
            </p>
          </div>

          {/* Main gear showcase */}
          <div
            id="gear-main"
            data-animate
            className={`grid lg:grid-cols-2 gap-6 mb-6 transition-all duration-700 delay-100 ${isVisible("gear-main") ? "opacity-100 translate-y-0" : "opacity-0 translate-y-10"}`}
          >
            {/* Camera card */}
            <div className="group relative bg-gradient-to-br from-white/5 to-white/0 border border-white/10 rounded-2xl p-8 hover:border-amber-400/40 transition-all duration-300 overflow-hidden">
              <div className="absolute top-0 right-0 w-32 h-32 bg-amber-400/5 rounded-full blur-2xl group-hover:bg-amber-400/10 transition-all duration-500" />
              <div className="relative">
                <div className="w-12 h-12 bg-amber-400/10 rounded-xl flex items-center justify-center mb-5 text-2xl">
                  📷
                </div>
                <div className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-2">Cuerpo</div>
                <div className="text-white text-2xl font-black mb-2">Sony Alpha a7R</div>
                <p className="text-white/50 text-sm leading-relaxed">
                  Full-frame de alta resolución con rango dinámico excepcional. Ideal para capturar el detalle y la nitidez de la acción deportiva incluso en condiciones lumínicas adversas.
                </p>
                <div className="mt-5 flex flex-wrap gap-2">
                  {["Full-Frame", "Alta Resolución", "Rango Dinámico"].map((tag) => (
                    <span key={tag} className="bg-white/5 border border-white/10 text-white/60 text-xs px-3 py-1 rounded-full">
                      {tag}
                    </span>
                  ))}
                </div>
              </div>
            </div>

            {/* Lens card */}
            <div className="group relative bg-gradient-to-br from-white/5 to-white/0 border border-white/10 rounded-2xl p-8 hover:border-amber-400/40 transition-all duration-300 overflow-hidden">
              <div className="absolute top-0 right-0 w-32 h-32 bg-amber-400/5 rounded-full blur-2xl group-hover:bg-amber-400/10 transition-all duration-500" />
              <div className="relative">
                <div className="w-12 h-12 bg-amber-400/10 rounded-xl flex items-center justify-center mb-5 text-2xl">
                  🔭
                </div>
                <div className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-2">Objetivo</div>
                <div className="text-white text-2xl font-black mb-2">Sony FE 70-200mm F4</div>
                <p className="text-white/50 text-sm leading-relaxed">
                  Teleobjetivo zoom de alto rendimiento que proporciona la velocidad de enfoque y la compresión necesarias para aislar a los protagonistas en pleno movimiento.
                </p>
                <div className="mt-5 flex flex-wrap gap-2">
                  {["70-200mm", "F4 OSS", "Teleobjetivo"].map((tag) => (
                    <span key={tag} className="bg-white/5 border border-white/10 text-white/60 text-xs px-3 py-1 rounded-full">
                      {tag}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Specs grid */}
          <div
            id="specs-grid"
            data-animate
            className={`grid grid-cols-2 md:grid-cols-3 gap-4 transition-all duration-700 delay-200 ${isVisible("specs-grid") ? "opacity-100 translate-y-0" : "opacity-0 translate-y-10"}`}
          >
            {SPECS.map((spec, i) => (
              <div
                key={spec.label}
                className="bg-white/3 border border-white/8 rounded-xl px-5 py-4 hover:border-amber-400/30 transition-all duration-300"
                style={{ transitionDelay: `${i * 50}ms` }}
              >
                <div className="text-white/40 text-xs tracking-widest uppercase mb-1">{spec.label}</div>
                <div className="text-white font-semibold text-sm">{spec.value}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── PHILOSOPHY ── */}
      <section className="py-24 px-6 relative overflow-hidden">
        <div className="absolute inset-0">
          <img
            src="https://images.pexels.com/photos/15949231/pexels-photo-15949231.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=800&w=1600"
            alt="background"
            className="w-full h-full object-cover"
            style={{ filter: "brightness(0.15)" }}
          />
          <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0a] via-transparent to-[#0a0a0a]" />
        </div>
        <div className="relative z-10 max-w-4xl mx-auto text-center">
          <div
            id="philosophy"
            data-animate
            className={`transition-all duration-1000 ${isVisible("philosophy") ? "opacity-100 translate-y-0" : "opacity-0 translate-y-16"}`}
          >
            <p className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-6">Filosofía</p>
            <blockquote
              className="text-3xl md:text-5xl lg:text-6xl font-black leading-tight text-white mb-8"
              style={{ fontFamily: "'Playfair Display', serif", fontStyle: "italic" }}
            >
              "La fotografía deportiva es periodismo visual: cada imagen debe contar una historia que las palabras no pueden."
            </blockquote>
            <div className="flex items-center justify-center gap-3">
              <div className="h-px w-12 bg-amber-400/50" />
              <span className="text-amber-400 text-sm font-semibold">Alber Visuals</span>
              <div className="h-px w-12 bg-amber-400/50" />
            </div>
          </div>
        </div>
      </section>

      {/* ── CONTACT ── */}
      <section id="contacto" className="py-24 px-6 bg-[#0f0f0f]">
        <div className="max-w-3xl mx-auto text-center">
          <div
            id="contact-content"
            data-animate
            className={`transition-all duration-700 ${isVisible("contact-content") ? "opacity-100 translate-y-0" : "opacity-0 translate-y-10"}`}
          >
            <p className="text-amber-400 text-xs font-bold tracking-widest uppercase mb-4">Contacto</p>
            <h2 className="text-4xl md:text-6xl font-black text-white mb-6 leading-tight">
              Hablemos de tu{" "}
              <span className="italic text-white/30" style={{ fontFamily: "'Playfair Display', serif" }}>
                proyecto
              </span>
            </h2>
            <p className="text-white/50 text-lg mb-12 leading-relaxed">
              Ya sea cobertura deportiva, contenido para clubes o colaboraciones con medios — estoy disponible para nuevos proyectos.
            </p>

            <div className="flex flex-col sm:flex-row gap-4 justify-center mb-16">
              <a
                href="mailto:albervisuals@gmail.com"
                className="inline-flex items-center justify-center gap-3 bg-amber-400 text-black font-bold px-8 py-4 rounded-full hover:bg-amber-300 transition-all duration-300 hover:shadow-[0_0_40px_rgba(251,191,36,0.4)] text-sm"
              >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                albervisuals@gmail.com
              </a>
              <a
                href="https://instagram.com/albervisuals"
                target="_blank"
                rel="noopener noreferrer"
                className="inline-flex items-center justify-center gap-3 border border-white/20 text-white font-medium px-8 py-4 rounded-full hover:border-white/40 hover:bg-white/5 transition-all duration-300 text-sm"
              >
                <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                </svg>
                @albervisuals
              </a>
            </div>

            {/* Divider */}
            <div className="border-t border-white/10 pt-8">
              <div className="flex flex-col sm:flex-row items-center justify-between gap-4 text-white/30 text-xs">
                <span>© 2025 Alber Visuals · Todos los derechos reservados</span>
                <span>Fotografía Deportiva · Móstoles, Madrid</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ── LIGHTBOX ── */}
      {lightbox && (
        <div
          className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-4"
          onClick={() => setLightbox(null)}
        >
          <button
            className="absolute top-6 right-6 text-white/60 hover:text-white transition-colors"
            onClick={() => setLightbox(null)}
          >
            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <div className="max-w-5xl w-full" onClick={(e) => e.stopPropagation()}>
            <img
              src={lightbox.url.replace("h=627", "h=900")}
              alt={lightbox.alt}
              className="w-full rounded-xl object-contain max-h-[80vh]"
            />
            <div className="mt-4 flex items-center gap-3">
              <span className="text-amber-400 text-xs font-bold tracking-widest uppercase">{lightbox.tag}</span>
              <span className="text-white/30">·</span>
              <span className="text-white/70 text-sm">{lightbox.alt}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
